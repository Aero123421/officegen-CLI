name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without leading v, for example 1.2.6"
        required: true

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: Build npm package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Check manifest version
        shell: bash
        run: |
          version="${{ steps.version.outputs.version }}"
          package_version="$(node -p "require('./package.json').version")"
          test "$package_version" = "$version"

      - name: Install without lifecycle scripts
        run: npm ci --ignore-scripts --prefer-online --no-audit --no-fund

      - name: Version sync check
        run: npm run version:check

      - name: Remediation matrix check
        run: npm run remediation:check

      - name: Contract check
        run: npm run contract:check

      - name: Schema coverage check
        run: npm run schema:coverage

      - name: npm audit
        run: npm audit --audit-level=moderate

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Security fixtures
        run: npm run security:fixtures

      - name: Benchmark local fixtures
        run: npm run benchmark:local-fixtures

      - name: Build
        run: npm run build

      - name: Packed install smoke
        run: npm run pack:smoke

      - name: GitHub install smoke
        run: npm run github-install:smoke

      - name: GitHub HEAD install smoke
        env:
          OFFICEGEN_GITHUB_INSTALL_SPEC: github:${{ github.repository }}#${{ github.sha }}
        run: npm run github-install:smoke

      - name: Post-tag perfect-spec smoke evidence
        run: npm run perfect-spec:post-tag-smoke

      - name: Perfect spec evidence
        run: npm run perfect-spec:evidence

      - name: Perfect spec publish gate
        run: npm run perfect-spec:check -- --gate=publish

      - name: Package npm tarball
        shell: bash
        run: |
          mkdir -p dist
          tarball="$(npm pack --silent)"
          release_tarball="officegen-v${{ steps.version.outputs.version }}.tgz"
          mv "$tarball" "dist/${release_tarball}"
          node scripts/sha256-file.mjs "dist/${release_tarball}" > "dist/${release_tarball}.sha256"

      - name: Release tarball install smoke
        run: npm run release-tarball:smoke -- "dist/officegen-v${{ steps.version.outputs.version }}.tgz"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/*

      - name: Upload package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: officegen-npm-package
          path: dist/*
          if-no-files-found: error

      - name: Upload perfect spec evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: officegen-perfect-spec-evidence
          path: .officegen/acceptance/perfect-spec/**
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"

      - name: Resolve release tag
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
            tag="v${version}"
          else
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Check manifest version
        shell: bash
        run: |
          version="${{ steps.version.outputs.version }}"
          package_version="$(node -p "require('./package.json').version")"
          test "$package_version" = "$version"

      - name: Install without lifecycle scripts
        run: npm ci --ignore-scripts --prefer-online --no-audit --no-fund

      - name: Version sync check
        run: npm run version:check

      - name: Download artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: officegen-npm-package
          path: dist

      - name: Create or update release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: officegen ${{ steps.version.outputs.tag }}
          files: dist/*
          generate_release_notes: true

      - name: Release asset smoke
        env:
          OFFICEGEN_RELEASE_TARBALL_SPEC: https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/officegen-v${{ steps.version.outputs.version }}.tgz
        run: npm run release-tarball:smoke
