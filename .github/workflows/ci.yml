name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  node:
    name: Node package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"

      - name: Install without lifecycle scripts
        run: npm ci --ignore-scripts --prefer-online --no-audit --no-fund

      - name: npm audit
        if: runner.os != 'Windows'
        run: npm audit --audit-level=moderate

      - name: Version sync check
        run: npm run version:check

      - name: Remediation matrix check
        run: npm run remediation:check

      - name: Contract check
        run: npm run contract:check

      - name: Schema coverage check
        run: npm run schema:coverage

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Security fixtures
        run: npm run security:fixtures

      - name: Benchmark local fixtures
        run: npm run benchmark:local-fixtures

      - name: Build
        run: npm run build

      - name: CLI smoke
        run: |
          node packages/cli/dist/main.js --version
          node packages/cli/dist/main.js capabilities --json

      - name: Packed install smoke
        run: npm run pack:smoke

      - name: GitHub HEAD install smoke
        env:
          OFFICEGEN_GITHUB_INSTALL_SPEC: github:${{ github.repository }}#${{ github.sha }}
        run: npm run github-install:smoke

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Dependency review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4 branch
