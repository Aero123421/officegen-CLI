name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    name: Rust native CLI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup component add rustfmt clippy

      - name: Format check
        run: cargo fmt --check

      - name: Test
        run: cargo test --locked

      - name: Build
        run: cargo build --release --locked

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"

      - name: Install without lifecycle scripts
        run: npm ci --ignore-scripts --prefer-online --no-audit --no-fund

      - name: Version sync check
        run: npm run version:check

      - name: Remediation matrix check
        run: npm run remediation:check

      - name: Native CLI smoke
        shell: bash
        run: |
          bin="target/release/officegen"
          if [ "$RUNNER_OS" = "Windows" ]; then bin="target/release/officegen.exe"; fi
          node scripts/native-release-smoke.mjs --bin "$bin" --expected-version "$(node -p "require('./package.json').version")"

      - name: v5 acceptance
        shell: bash
        run: |
          bin="target/release/officegen"
          if [ "$RUNNER_OS" = "Windows" ]; then bin="target/release/officegen.exe"; fi
          npm run v5:acceptance -- --bin "$bin" --expected-version current

      - name: Installer smoke
        run: npm run installer:smoke

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Dependency review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4 branch
